<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Logs — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Audit logs</h2>
    <p class="text-muted-custom mb-4">A record of sensitive actions taken across the bank.</p>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr><th>Date</th><th>User ID</th><th>Action</th><th>Details</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("MANAGER", "audit_logs.html");

async function load() {
  try {
    const logs = await Api.get("/manager/audit-logs");
    const body = document.getElementById("tableBody");
    body.innerHTML = logs.length ? logs.map(l => `
      <tr><td>${formatDate(l.created_at)}</td><td>${l.user_id ?? "-"}</td><td>${l.action}</td><td>${l.details ?? "-"}</td></tr>
    `).join("") : `<tr><td colspan="4" class="text-center text-muted-custom py-4">No audit log entries yet.</td></tr>`;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();
</script>
</body>
</html>
