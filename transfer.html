<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Transfer money</h2>
    <p class="text-muted-custom mb-4">Send money to any account number, including your own.</p>

    <div class="row">
      <div class="col-lg-6">
        <div class="content-card">
          <div id="alertBox"></div>
          <form id="transferForm">
            <div class="mb-3">
              <label class="form-label">From account</label>
              <select class="form-select" id="fromAccountId" required></select>
            </div>
            <div class="mb-3">
              <label class="form-label">To account number</label>
              <input type="text" class="form-control font-mono" id="toAccountNumber" required placeholder="12-digit account number">
            </div>
            <div class="mb-3">
              <label class="form-label">Amount (₹)</label>
              <input type="number" class="form-control" id="amount" min="1" step="0.01" required placeholder="e.g. 2000">
            </div>
            <div class="mb-3">
              <label class="form-label">Description (optional)</label>
              <input type="text" class="form-control" id="description" placeholder="e.g. Rent payment">
            </div>
            <button type="submit" class="btn btn-gold w-100 py-2" id="submitBtn">Transfer</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("CUSTOMER", "transfer.html");

async function loadAccounts() {
  try {
    const accounts = await Api.get("/customer/accounts");
    const select = document.getElementById("fromAccountId");
    const active = accounts.filter(a => a.status === "ACTIVE");
    if (active.length === 0) {
      select.innerHTML = `<option value="">No active accounts</option>`;
      return;
    }
    select.innerHTML = active.map(a => `<option value="${a.account_id}">${a.account_type} — ${a.account_number} (${formatCurrency(a.balance)})</option>`).join("");
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
loadAccounts();

document.getElementById("transferForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Processing...";
  try {
    const res = await Api.post("/customer/transfer", {
      from_account_id: parseInt(document.getElementById("fromAccountId").value),
      to_account_number: document.getElementById("toAccountNumber").value.trim(),
      amount: parseFloat(document.getElementById("amount").value),
      description: document.getElementById("description").value || null,
    });
    showAlert("alertBox", `${res.message}. Reference: ${res.reference_no}. New balance: ${formatCurrency(res.balance_after)}`, "success");
    document.getElementById("transferForm").reset();
    loadAccounts();
  } catch (err) {
    showAlert("alertBox", err.message);
  } finally {
    btn.disabled = false; btn.textContent = "Transfer";
  }
});
</script>
</body>
</html>
