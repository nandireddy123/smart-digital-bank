<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branches — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <div class="d-flex justify-content-between align-items-center mb-1">
      <h2 class="mb-0">Branches</h2>
      <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#createBranchModal">
        <i class="fa-solid fa-plus me-1"></i> Add branch
      </button>
    </div>
    <p class="text-muted-custom mb-4">Every physical branch the bank operates.</p>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr><th>Branch name</th><th>Code</th><th>City</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="createBranchModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius: var(--radius);">
      <div class="modal-header">
        <h5 class="modal-title">Add a new branch</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <form id="branchForm">
          <div class="mb-3"><label class="form-label">Branch name</label><input class="form-control" id="branchName" required></div>
          <div class="mb-3"><label class="form-label">Branch code</label><input class="form-control" id="branchCode" required></div>
          <div class="mb-3"><label class="form-label">City</label><input class="form-control" id="city"></div>
          <div class="mb-3"><label class="form-label">Address</label><input class="form-control" id="address"></div>
          <div class="mb-3"><label class="form-label">IFSC code</label><input class="form-control" id="ifsc"></div>
          <button type="submit" class="btn btn-gold w-100">Create branch</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("MANAGER", "branches.html");

async function load() {
  try {
    const branches = await Api.get("/manager/branches");
    const body = document.getElementById("tableBody");
    body.innerHTML = branches.length ? branches.map(b => `
      <tr><td>${b.branch_name}</td><td class="font-mono">${b.branch_code}</td><td>${b.city ?? "-"}</td></tr>
    `).join("") : `<tr><td colspan="3" class="text-center text-muted-custom py-4">No branches yet.</td></tr>`;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();

document.getElementById("branchForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    const params = new URLSearchParams({
      branch_name: document.getElementById("branchName").value.trim(),
      branch_code: document.getElementById("branchCode").value.trim(),
      city: document.getElementById("city").value.trim(),
      address: document.getElementById("address").value.trim(),
      ifsc_code: document.getElementById("ifsc").value.trim(),
    });
    await Api.post(`/manager/branches?${params.toString()}`, {});
    showAlert("modalAlert", "Branch created.", "success");
    document.getElementById("branchForm").reset();
    load();
    setTimeout(() => bootstrap.Modal.getInstance(document.getElementById("createBranchModal"))?.hide(), 1000);
  } catch (err) {
    showAlert("modalAlert", err.message);
  }
});
</script>
</body>
</html>
