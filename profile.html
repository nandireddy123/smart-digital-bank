<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Your profile</h2>
    <p class="text-muted-custom mb-4">Update your details or change your password.</p>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="content-card">
          <h5 class="mb-3">Edit profile</h5>
          <div id="alertBoxProfile"></div>
          <form id="profileForm">
            <div class="mb-3">
              <label class="form-label">Full name</label>
              <input type="text" class="form-control" id="fullName">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" disabled>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone">
            </div>
            <div class="mb-3">
              <label class="form-label">Role</label>
              <input type="text" class="form-control" id="role" disabled>
            </div>
            <button type="submit" class="btn btn-gold w-100 py-2">Save changes</button>
          </form>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="content-card">
          <h5 class="mb-3">Change password</h5>
          <div id="alertBoxPassword"></div>
          <form id="passwordForm">
            <div class="mb-3">
              <label class="form-label">Current password</label>
              <input type="password" class="form-control" id="oldPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">New password</label>
              <input type="password" class="form-control" id="newPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-navy w-100 py-2">Change password</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init(Auth.role(), "profile.html");

async function loadProfile() {
  try {
    const p = await Api.get("/profile/me");
    document.getElementById("fullName").value = p.full_name;
    document.getElementById("email").value = p.email;
    document.getElementById("phone").value = p.phone || "";
    document.getElementById("role").value = p.role;
  } catch (err) {
    showAlert("alertBoxProfile", err.message);
  }
}
loadProfile();

document.getElementById("profileForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await Api.put("/profile/me", {
      full_name: document.getElementById("fullName").value.trim(),
      phone: document.getElementById("phone").value.trim(),
    });
    showAlert("alertBoxProfile", "Profile updated successfully.", "success");
    localStorage.setItem("sb_name", document.getElementById("fullName").value.trim());
  } catch (err) {
    showAlert("alertBoxProfile", err.message);
  }
});

document.getElementById("passwordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await Api.post("/auth/change-password", {
      old_password: document.getElementById("oldPassword").value,
      new_password: document.getElementById("newPassword").value,
    });
    showAlert("alertBoxPassword", "Password changed successfully.", "success");
    document.getElementById("passwordForm").reset();
  } catch (err) {
    showAlert("alertBoxPassword", err.message);
  }
});
</script>
</body>
</html>
