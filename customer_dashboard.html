<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>

    <h2 class="mb-1">Welcome back, <span id="welcomeName"></span></h2>
    <p class="text-muted-custom mb-4">Here's where things stand today.</p>

    <div id="alertBox"></div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="stat-label">Total balance</div>
              <div class="stat-value" id="statTotalBalance">₹0.00</div>
            </div>
            <div class="stat-icon"><i class="fa-solid fa-sack-dollar"></i></div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="stat-label">Accounts</div>
              <div class="stat-value" id="statAccountCount">0</div>
            </div>
            <div class="stat-icon"><i class="fa-solid fa-wallet"></i></div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="stat-label">Active loans</div>
              <div class="stat-value" id="statLoanCount">0</div>
            </div>
            <div class="stat-icon"><i class="fa-solid fa-hand-holding-dollar"></i></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-12">
        <div class="content-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Your accounts</h5>
            <a href="accounts.html" class="btn btn-outline-gold btn-sm">Manage accounts</a>
          </div>
          <div id="accountsList" class="row g-3"></div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-12">
        <div class="content-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Quick actions</h5>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <a href="deposit.html" class="btn btn-navy"><i class="fa-solid fa-arrow-down me-1"></i> Deposit</a>
            <a href="withdraw.html" class="btn btn-navy"><i class="fa-solid fa-arrow-up me-1"></i> Withdraw</a>
            <a href="transfer.html" class="btn btn-navy"><i class="fa-solid fa-right-left me-1"></i> Transfer</a>
            <a href="loans.html" class="btn btn-navy"><i class="fa-solid fa-hand-holding-dollar me-1"></i> Apply for a loan</a>
            <a href="support.html" class="btn btn-outline-gold"><i class="fa-solid fa-headset me-1"></i> Contact support</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("CUSTOMER", "customer_dashboard.html");
document.getElementById("welcomeName").textContent = Auth.name();

function statusBadgeClass(status) {
  return { ACTIVE: "badge-status-active", PENDING: "badge-status-pending",
           FROZEN: "badge-status-frozen", CLOSED: "badge-status-closed" }[status] || "badge-status-closed";
}

async function load() {
  try {
    const [accounts, loans] = await Promise.all([
      Api.get("/customer/accounts"),
      Api.get("/customer/loans"),
    ]);

    const total = accounts.reduce((sum, a) => sum + a.balance, 0);
    document.getElementById("statTotalBalance").textContent = formatCurrency(total);
    document.getElementById("statAccountCount").textContent = accounts.length;
    document.getElementById("statLoanCount").textContent = loans.filter(l => l.status === "APPROVED").length;

    const listEl = document.getElementById("accountsList");
    if (accounts.length === 0) {
      listEl.innerHTML = `<div class="col-12 text-muted-custom">No accounts yet. <a href="accounts.html" class="text-gold">Open your first account</a>.</div>`;
    } else {
      listEl.innerHTML = accounts.map(a => `
        <div class="col-md-4">
          <div class="content-card">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted-custom small">${a.account_type}</span>
              <span class="badge-status ${statusBadgeClass(a.status)} px-2 py-1 rounded-pill">${a.status}</span>
            </div>
            <div class="font-mono small text-muted-custom mb-1">${a.account_number}</div>
            <div class="fs-4 font-mono">${formatCurrency(a.balance)}</div>
          </div>
        </div>
      `).join("");
    }
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();
</script>
</body>
</html>
