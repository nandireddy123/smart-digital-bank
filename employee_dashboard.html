<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Dashboard — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Welcome, <span id="welcomeName"></span></h2>
    <p class="text-muted-custom mb-4">Here's what needs your attention today.</p>

    <div id="alertBox"></div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="d-flex justify-content-between">
            <div>
              <div class="stat-label">Pending accounts</div>
              <div class="stat-value" id="statPending">0</div>
            </div>
            <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="d-flex justify-content-between">
            <div>
              <div class="stat-label">Total customers</div>
              <div class="stat-value" id="statCustomers">0</div>
            </div>
            <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="d-flex justify-content-between">
            <div>
              <div class="stat-label">KYC verified</div>
              <div class="stat-value" id="statKyc">0</div>
            </div>
            <div class="stat-icon"><i class="fa-solid fa-user-check"></i></div>
          </div>
        </div>
      </div>
    </div>

    <div class="content-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Accounts awaiting approval</h5>
        <a href="pending_accounts.html" class="btn btn-outline-gold btn-sm">View all</a>
      </div>
      <div id="pendingPreview"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("EMPLOYEE", "employee_dashboard.html");
document.getElementById("welcomeName").textContent = Auth.name();

async function load() {
  try {
    const [pending, customers] = await Promise.all([
      Api.get("/employee/accounts/pending"),
      Api.get("/employee/customers"),
    ]);
    document.getElementById("statPending").textContent = pending.length;
    document.getElementById("statCustomers").textContent = customers.length;
    document.getElementById("statKyc").textContent = customers.filter(c => c.kyc_verified).length;

    const el = document.getElementById("pendingPreview");
    el.innerHTML = pending.length ? pending.slice(0, 5).map(a => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
        <div>
          <div class="fw-semibold font-mono">${a.account_number}</div>
          <div class="text-muted-custom small">${a.account_type}</div>
        </div>
        <span class="badge-status badge-status-pending px-2 py-1 rounded-pill">PENDING</span>
      </div>
    `).join("") : `<p class="text-muted-custom mb-0">No accounts awaiting approval. 🎉</p>`;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();
</script>
</body>
</html>
