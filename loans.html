<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loans — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1" id="pageTitle">Loans</h2>
    <p class="text-muted-custom mb-4" id="pageSubtitle">Apply for a loan and track its status.</p>

    <div id="alertBox"></div>

    <!-- Customer: application form -->
    <div class="content-card mb-4" id="applyCard">
      <h5 class="mb-3">Apply for a loan</h5>
      <form id="loanForm" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Account</label>
          <select class="form-select" id="accountId" required></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Loan type</label>
          <select class="form-select" id="loanType" required>
            <option>Personal</option>
            <option>Home</option>
            <option>Education</option>
            <option>Vehicle</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Principal amount (₹)</label>
          <input type="number" class="form-control" id="principal" min="1000" step="100" required placeholder="e.g. 100000">
        </div>
        <div class="col-md-3">
          <label class="form-label">Tenure (months)</label>
          <input type="number" class="form-control" id="tenure" min="1" required placeholder="e.g. 24">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-gold" id="applyBtn">Submit application</button>
        </div>
      </form>
    </div>

    <div class="content-card">
      <h5 class="mb-3" id="listTitle">Your loan applications</h5>
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr>
            <th>Loan ID</th><th>Type</th><th>Principal</th><th>Interest</th><th>Tenure</th><th>Status</th><th id="actionsHeader" class="d-none">Action</th>
          </tr></thead>
          <tbody id="loanTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
const role = Auth.role();
Layout.init(role, "loans.html");

function statusClass(s) {
  return { APPROVED: "badge-status-active", PENDING: "badge-status-pending", REJECTED: "badge-status-frozen", CLOSED: "badge-status-closed" }[s] || "badge-status-closed";
}

if (role === "CUSTOMER") {
  async function loadAccounts() {
    const accounts = await Api.get("/customer/accounts");
    const active = accounts.filter(a => a.status === "ACTIVE");
    const select = document.getElementById("accountId");
    select.innerHTML = active.length
      ? active.map(a => `<option value="${a.account_id}">${a.account_type} — ${a.account_number}</option>`).join("")
      : `<option value="">No active accounts</option>`;
  }

  async function loadMyLoans() {
    const loans = await Api.get("/customer/loans");
    const body = document.getElementById("loanTableBody");
    body.innerHTML = loans.length ? loans.map(l => `
      <tr>
        <td>#${l.loan_id}</td><td>${l.loan_type}</td>
        <td class="font-mono">${formatCurrency(l.principal_amount)}</td>
        <td>${l.interest_rate}%</td><td>${l.tenure_months} mo</td>
        <td><span class="badge-status ${statusClass(l.status)} px-2 py-1 rounded-pill">${l.status}</span></td>
      </tr>`).join("") : `<tr><td colspan="6" class="text-center text-muted-custom py-4">No loan applications yet.</td></tr>`;
  }

  loadAccounts();
  loadMyLoans();

  document.getElementById("loanForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("applyBtn");
    btn.disabled = true; btn.textContent = "Submitting...";
    try {
      const res = await Api.post("/customer/loans/apply", {
        account_id: parseInt(document.getElementById("accountId").value),
        loan_type: document.getElementById("loanType").value,
        principal_amount: parseFloat(document.getElementById("principal").value),
        tenure_months: parseInt(document.getElementById("tenure").value),
      });
      showAlert("alertBox", `${res.message} (status: ${res.status})`, "success");
      document.getElementById("loanForm").reset();
      loadMyLoans();
    } catch (err) {
      showAlert("alertBox", err.message);
    } finally {
      btn.disabled = false; btn.textContent = "Submit application";
    }
  });

} else if (role === "MANAGER") {
  document.getElementById("applyCard").classList.add("d-none");
  document.getElementById("listTitle").textContent = "Pending loan applications";
  document.getElementById("actionsHeader").classList.remove("d-none");

  async function loadPending() {
    const loans = await Api.get("/manager/loans/pending");
    const body = document.getElementById("loanTableBody");
    body.innerHTML = loans.length ? loans.map(l => `
      <tr>
        <td>#${l.loan_id}</td><td>${l.loan_type}</td>
        <td class="font-mono">${formatCurrency(l.principal_amount)}</td>
        <td>-</td><td>${l.tenure_months} mo</td>
        <td><span class="badge-status badge-status-pending px-2 py-1 rounded-pill">PENDING</span></td>
        <td>
          <button class="btn btn-sm btn-gold me-1" onclick="decide(${l.loan_id}, true)">Approve</button>
          <button class="btn btn-sm btn-outline-gold" onclick="decide(${l.loan_id}, false)">Reject</button>
        </td>
      </tr>`).join("") : `<tr><td colspan="7" class="text-center text-muted-custom py-4">No pending loan applications.</td></tr>`;
  }

  window.decide = async (loanId, approve) => {
    try {
      const res = await Api.post("/manager/loans/decide", { loan_id: loanId, approve });
      showAlert("alertBox", res.message, "success");
      loadPending();
    } catch (err) {
      showAlert("alertBox", err.message);
    }
  };

  loadPending();
} else {
  // EMPLOYEE role doesn't manage loans per the spec
  document.getElementById("applyCard").classList.add("d-none");
  document.getElementById("loanTableBody").innerHTML = `<tr><td colspan="7" class="text-center text-muted-custom py-4">Loans are handled by Managers.</td></tr>`;
}
</script>
</body>
</html>
