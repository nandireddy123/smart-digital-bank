<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Notifications</h2>
    <p class="text-muted-custom mb-4">Updates about your accounts, loans, and approvals.</p>

    <div id="alertBox"></div>
    <div id="notifList" class="d-flex flex-column gap-2"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init(Auth.role(), "notifications.html");

async function load() {
  try {
    const notes = await Api.get("/profile/notifications");
    const el = document.getElementById("notifList");
    el.innerHTML = notes.length ? notes.map(n => `
      <div class="content-card d-flex justify-content-between align-items-start">
        <div>
          <div class="fw-semibold">${n.title}</div>
          <div class="text-muted-custom small">${n.message}</div>
        </div>
        <div class="text-muted-custom small">${formatDate(n.created_at)}</div>
      </div>
    `).join("") : `<div class="content-card text-center text-muted-custom py-4">No notifications yet.</div>`;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();
</script>
</body>
</html>
