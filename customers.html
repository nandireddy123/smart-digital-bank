<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Customers</h2>
    <p class="text-muted-custom mb-4">Every customer registered with the bank.</p>

    <div class="content-card mb-3">
      <input type="text" class="form-control" id="searchBox" placeholder="Search by name or email...">
    </div>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr>
            <th>Name</th><th>Email</th><th>KYC status</th><th id="actionsHeader" class="d-none">Action</th>
          </tr></thead>
          <tbody id="customersTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
const role = Auth.role();
Layout.init(role, "customers.html");
if (role === "EMPLOYEE") document.getElementById("actionsHeader").classList.remove("d-none");

let customersCache = [];

function render(list) {
  const body = document.getElementById("customersTableBody");
  body.innerHTML = list.length ? list.map(c => `
    <tr>
      <td>${c.full_name || "-"}</td>
      <td>${c.email || "-"}</td>
      <td>
        <span class="badge-status ${c.kyc_verified ? 'badge-status-active' : 'badge-status-pending'} px-2 py-1 rounded-pill">
          ${c.kyc_verified ? 'Verified' : 'Pending'}
        </span>
      </td>
      ${role === "EMPLOYEE" ? `<td>${c.kyc_verified ? '-' : `<button class="btn btn-sm btn-gold" onclick="verify(${c.customer_id})">Verify KYC</button>`}</td>` : ""}
    </tr>
  `).join("") : `<tr><td colspan="4" class="text-center text-muted-custom py-4">No customers found.</td></tr>`;
}

async function load() {
  try {
    customersCache = await Api.get("/employee/customers");
    render(customersCache);
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();

document.getElementById("searchBox").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  render(customersCache.filter(c =>
    (c.full_name || "").toLowerCase().includes(q) || (c.email || "").toLowerCase().includes(q)
  ));
});

window.verify = async (customerId) => {
  try {
    await Api.post(`/employee/customers/${customerId}/verify-kyc`, {});
    showAlert("alertBox", "Customer KYC verified.", "success");
    load();
  } catch (err) {
    showAlert("alertBox", err.message);
  }
};
</script>
</body>
</html>
