<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Dashboard — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Welcome, <span id="welcomeName"></span></h2>
    <p class="text-muted-custom mb-4">Bank-wide overview.</p>

    <div id="alertBox"></div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-label">Total accounts</div>
          <div class="stat-value" id="statTotalAccounts">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-label">Total balance held</div>
          <div class="stat-value" id="statTotalBalance">₹0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-label">Active accounts</div>
          <div class="stat-value" id="statActive">0</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-label">Pending loans</div>
          <div class="stat-value" id="statLoans">0</div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="content-card h-100">
          <h5 class="mb-3">Quick actions</h5>
          <div class="d-flex flex-wrap gap-2">
            <a href="employees.html" class="btn btn-navy"><i class="fa-solid fa-id-badge me-1"></i> Manage employees</a>
            <a href="loans.html" class="btn btn-navy"><i class="fa-solid fa-hand-holding-dollar me-1"></i> Review loans</a>
            <a href="accounts.html" class="btn btn-navy"><i class="fa-solid fa-wallet me-1"></i> Freeze/activate accounts</a>
            <a href="reports.html" class="btn btn-outline-gold"><i class="fa-solid fa-chart-line me-1"></i> View reports</a>
            <a href="audit_logs.html" class="btn btn-outline-gold"><i class="fa-solid fa-shield-halved me-1"></i> Audit logs</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="content-card h-100">
          <h5 class="mb-3">Account status breakdown</h5>
          <div class="d-flex justify-content-between py-1"><span>Active</span><span id="bdActive" class="fw-semibold">0</span></div>
          <div class="d-flex justify-content-between py-1"><span>Pending</span><span id="bdPending" class="fw-semibold">0</span></div>
          <div class="d-flex justify-content-between py-1"><span>Frozen</span><span id="bdFrozen" class="fw-semibold">0</span></div>
          <div class="d-flex justify-content-between py-1"><span>Total transactions</span><span id="bdTxns" class="fw-semibold">0</span></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("MANAGER", "manager_dashboard.html");
document.getElementById("welcomeName").textContent = Auth.name();

async function load() {
  try {
    const [summary, loans] = await Promise.all([
      Api.get("/manager/reports/summary"),
      Api.get("/manager/loans/pending"),
    ]);
    document.getElementById("statTotalAccounts").textContent = summary.total_accounts;
    document.getElementById("statTotalBalance").textContent = formatCurrency(summary.total_balance);
    document.getElementById("statActive").textContent = summary.active_accounts;
    document.getElementById("statLoans").textContent = loans.length;

    document.getElementById("bdActive").textContent = summary.active_accounts;
    document.getElementById("bdPending").textContent = summary.pending_accounts;
    document.getElementById("bdFrozen").textContent = summary.frozen_accounts;
    document.getElementById("bdTxns").textContent = summary.total_transactions;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();
</script>
</body>
</html>
