<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body class="navy-bg" style="min-height:100vh;">

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="w-100" style="max-width: 420px;">
    <a href="index.html" class="brand-mark d-flex justify-content-center mb-4">
      <span class="brand-seal">S</span> Smart Digital Bank
    </a>

    <div class="glass-card p-4 p-md-5">
      <h3 class="text-white mb-1">Welcome back</h3>
      <p class="text-muted-custom mb-4">Log in to your dashboard</p>

      <div id="alertBox"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" required placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required placeholder="••••••••">
        </div>
        <div class="d-flex justify-content-end mb-3">
          <a href="forgot_password.html" class="small text-gold">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-gold w-100 py-2" id="loginBtn">Log in</button>
      </form>

      <p class="text-center text-muted-custom small mt-4 mb-0">
        New here? <a href="register.html" class="text-gold">Create a customer account</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "Logging in...";
  try {
    const data = await Api.post("/auth/login", {
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value,
    });
    Auth.saveSession(data);
    window.location.href = Auth.dashboardForRole(data.role);
  } catch (err) {
    showAlert("alertBox", err.message);
    btn.disabled = false;
    btn.textContent = "Log in";
  }
});
</script>
</body>
</html>
