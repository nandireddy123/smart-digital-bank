<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Withdraw money</h2>
    <p class="text-muted-custom mb-4">Each account type has its own per-transaction limit and minimum balance rule.</p>

    <div class="row">
      <div class="col-lg-6">
        <div class="content-card">
          <div id="alertBox"></div>
          <form id="withdrawForm">
            <div class="mb-3">
              <label class="form-label">Account</label>
              <select class="form-select" id="accountId" required></select>
              <div class="form-text" id="accountHint"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount (₹)</label>
              <input type="number" class="form-control" id="amount" min="1" step="0.01" required placeholder="e.g. 1000">
            </div>
            <div class="mb-3">
              <label class="form-label">Description (optional)</label>
              <input type="text" class="form-control" id="description" placeholder="e.g. ATM withdrawal">
            </div>
            <button type="submit" class="btn btn-gold w-100 py-2" id="submitBtn">Withdraw</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("CUSTOMER", "withdraw.html");

const LIMITS = { SAVINGS: 50000, CURRENT: 500000, STUDENT: 10000 };
let accountsCache = [];

async function loadAccounts() {
  try {
    accountsCache = await Api.get("/customer/accounts");
    const select = document.getElementById("accountId");
    const active = accountsCache.filter(a => a.status === "ACTIVE");
    if (active.length === 0) {
      select.innerHTML = `<option value="">No active accounts</option>`;
      return;
    }
    select.innerHTML = active.map(a => `<option value="${a.account_id}">${a.account_type} — ${a.account_number} (${formatCurrency(a.balance)})</option>`).join("");
    updateHint();
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}

function updateHint() {
  const id = parseInt(document.getElementById("accountId").value);
  const acc = accountsCache.find(a => a.account_id === id);
  const hintEl = document.getElementById("accountHint");
  if (acc) {
    hintEl.textContent = `Per-transaction limit: ${formatCurrency(LIMITS[acc.account_type])} · Minimum balance to keep: ${formatCurrency(acc.min_balance)}`;
  }
}
document.getElementById("accountId").addEventListener("change", updateHint);
loadAccounts();

document.getElementById("withdrawForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Processing...";
  try {
    const res = await Api.post("/customer/withdraw", {
      account_id: parseInt(document.getElementById("accountId").value),
      amount: parseFloat(document.getElementById("amount").value),
      description: document.getElementById("description").value || null,
    });
    showAlert("alertBox", `${res.message}. Reference: ${res.reference_no}. New balance: ${formatCurrency(res.balance_after)}`, "success");
    document.getElementById("withdrawForm").reset();
    loadAccounts();
  } catch (err) {
    showAlert("alertBox", err.message);
  } finally {
    btn.disabled = false; btn.textContent = "Withdraw";
  }
});
</script>
</body>
</html>
