<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Accounts — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Pending account approvals</h2>
    <p class="text-muted-custom mb-4">Review and activate accounts customers have requested.</p>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr><th>Account No.</th><th>Type</th><th>Customer ID</th><th>Action</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("EMPLOYEE", "pending_accounts.html");

async function load() {
  try {
    const pending = await Api.get("/employee/accounts/pending");
    const body = document.getElementById("tableBody");
    body.innerHTML = pending.length ? pending.map(a => `
      <tr>
        <td class="font-mono">${a.account_number}</td>
        <td>${a.account_type}</td>
        <td>#${a.customer_id}</td>
        <td><button class="btn btn-sm btn-gold" onclick="approve(${a.account_id})">Approve &amp; activate</button></td>
      </tr>
    `).join("") : `<tr><td colspan="4" class="text-center text-muted-custom py-4">Nothing pending. All caught up!</td></tr>`;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();

window.approve = async (accountId) => {
  try {
    await Api.post("/employee/accounts/approve", { account_id: accountId });
    showAlert("alertBox", "Account approved and activated.", "success");
    load();
  } catch (err) {
    showAlert("alertBox", err.message);
  }
};
</script>
</body>
</html>
