<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Reports</h2>
    <p class="text-muted-custom mb-4">A snapshot of the bank's health.</p>

    <div id="alertBox"></div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="stat-card"><div class="stat-label">Total accounts</div><div class="stat-value" id="rTotal">0</div></div>
      </div>
      <div class="col-md-4">
        <div class="stat-card"><div class="stat-label">Total balance held</div><div class="stat-value" id="rBalance">₹0</div></div>
      </div>
      <div class="col-md-4">
        <div class="stat-card"><div class="stat-label">Total transactions</div><div class="stat-value" id="rTxns">0</div></div>
      </div>
      <div class="col-md-4">
        <div class="stat-card"><div class="stat-label">Active accounts</div><div class="stat-value" id="rActive">0</div></div>
      </div>
      <div class="col-md-4">
        <div class="stat-card"><div class="stat-label">Pending approvals</div><div class="stat-value" id="rPending">0</div></div>
      </div>
      <div class="col-md-4">
        <div class="stat-card"><div class="stat-label">Frozen accounts</div><div class="stat-value" id="rFrozen">0</div></div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("MANAGER", "reports.html");

async function load() {
  try {
    const s = await Api.get("/manager/reports/summary");
    document.getElementById("rTotal").textContent = s.total_accounts;
    document.getElementById("rBalance").textContent = formatCurrency(s.total_balance);
    document.getElementById("rTxns").textContent = s.total_transactions;
    document.getElementById("rActive").textContent = s.active_accounts;
    document.getElementById("rPending").textContent = s.pending_accounts;
    document.getElementById("rFrozen").textContent = s.frozen_accounts;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();
</script>
</body>
</html>
