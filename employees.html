<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employees — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <div class="d-flex justify-content-between align-items-center mb-1">
      <h2 class="mb-0">Employees</h2>
      <button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#createEmployeeModal">
        <i class="fa-solid fa-plus me-1"></i> Add employee
      </button>
    </div>
    <p class="text-muted-custom mb-4">Employees cannot self-register — only a Manager can create one.</p>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr><th>Name</th><th>Email</th><th>Designation</th><th>Branch ID</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="createEmployeeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius: var(--radius);">
      <div class="modal-header">
        <h5 class="modal-title">Create employee account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <form id="createForm">
          <div class="mb-3"><label class="form-label">Full name</label><input class="form-control" id="fullName" required></div>
          <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="email" required></div>
          <div class="mb-3"><label class="form-label">Phone</label><input class="form-control" id="phone"></div>
          <div class="mb-3"><label class="form-label">Temporary password</label><input type="password" class="form-control" id="password" minlength="6" required></div>
          <div class="mb-3"><label class="form-label">Branch ID</label><input type="number" class="form-control" id="branchId" value="1"></div>
          <button type="submit" class="btn btn-gold w-100">Create employee</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init("MANAGER", "employees.html");

async function load() {
  try {
    const employees = await Api.get("/manager/employees");
    const body = document.getElementById("tableBody");
    body.innerHTML = employees.length ? employees.map(e => `
      <tr><td>${e.full_name}</td><td>${e.email}</td><td>${e.designation}</td><td>${e.branch_id ?? "-"}</td></tr>
    `).join("") : `<tr><td colspan="4" class="text-center text-muted-custom py-4">No employees yet. Add the first one.</td></tr>`;
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}
load();

document.getElementById("createForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await Api.post("/manager/employees", {
      full_name: document.getElementById("fullName").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim() || null,
      password: document.getElementById("password").value,
      branch_id: parseInt(document.getElementById("branchId").value) || null,
    });
    showAlert("modalAlert", "Employee created successfully.", "success");
    document.getElementById("createForm").reset();
    load();
    setTimeout(() => bootstrap.Modal.getInstance(document.getElementById("createEmployeeModal"))?.hide(), 1200);
  } catch (err) {
    showAlert("modalAlert", err.message);
  }
});
</script>
</body>
</html>
