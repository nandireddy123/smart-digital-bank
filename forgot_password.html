<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body class="navy-bg" style="min-height:100vh;">

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="w-100" style="max-width: 420px;">
    <a href="index.html" class="brand-mark d-flex justify-content-center mb-4">
      <span class="brand-seal">S</span> Smart Digital Bank
    </a>

    <div class="glass-card p-4 p-md-5">

      <!-- STEP 1: enter email -->
      <div id="stepEmail">
        <h3 class="text-white mb-1">Forgot password</h3>
        <p class="text-muted-custom mb-4">Enter your email — we'll send an OTP.</p>
        <div id="alertBox1"></div>
        <form id="emailForm">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" required placeholder="you@example.com">
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2" id="emailBtn">Send OTP</button>
        </form>
      </div>

      <!-- STEP 2: OTP + new password -->
      <div id="stepReset" class="d-none">
        <h3 class="text-white mb-1">Reset password</h3>
        <p class="text-muted-custom mb-4">Enter the OTP and your new password.</p>
        <div id="alertBox2"></div>
        <form id="resetForm">
          <div class="mb-3">
            <label class="form-label">OTP code</label>
            <input type="text" class="form-control font-mono" id="otpCode" required maxlength="6" placeholder="000000">
          </div>
          <div class="mb-3">
            <label class="form-label">New password</label>
            <input type="password" class="form-control" id="newPassword" required minlength="6" placeholder="At least 6 characters">
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2" id="resetBtn">Reset password</button>
        </form>
      </div>

      <!-- STEP 3: Done -->
      <div id="stepDone" class="d-none text-center">
        <i class="fa-solid fa-circle-check text-gold fs-1 mb-3"></i>
        <h3 class="text-white">Password reset!</h3>
        <p class="text-muted-custom mb-4">You can now log in with your new password.</p>
        <a href="login.html" class="btn btn-gold w-100 py-2">Go to login</a>
      </div>

      <p class="text-center text-muted-custom small mt-4 mb-0">
        Remembered it? <a href="login.html" class="text-gold">Back to login</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
let targetEmail = "";

document.getElementById("emailForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("emailBtn");
  btn.disabled = true; btn.textContent = "Sending...";
  try {
    targetEmail = document.getElementById("email").value.trim();
    await Api.post("/auth/forgot-password", { email: targetEmail });
    document.getElementById("stepEmail").classList.add("d-none");
    document.getElementById("stepReset").classList.remove("d-none");
  } catch (err) {
    showAlert("alertBox1", err.message);
  } finally {
    btn.disabled = false; btn.textContent = "Send OTP";
  }
});

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("resetBtn");
  btn.disabled = true; btn.textContent = "Resetting...";
  try {
    await Api.post("/auth/reset-password", {
      email: targetEmail,
      otp_code: document.getElementById("otpCode").value.trim(),
      new_password: document.getElementById("newPassword").value,
    });
    document.getElementById("stepReset").classList.add("d-none");
    document.getElementById("stepDone").classList.remove("d-none");
  } catch (err) {
    showAlert("alertBox2", err.message);
    btn.disabled = false; btn.textContent = "Reset password";
  }
});
</script>
</body>
</html>
