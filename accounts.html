<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>

    <div class="d-flex justify-content-between align-items-center mb-1">
      <h2 class="mb-0" id="pageTitle">Accounts</h2>
      <button class="btn btn-gold" id="openAccountBtn" data-bs-toggle="modal" data-bs-target="#openAccountModal">
        <i class="fa-solid fa-plus me-1"></i> Open new account
      </button>
    </div>
    <p class="text-muted-custom mb-4" id="pageSubtitle">Savings, Current, and Student accounts you hold with us.</p>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr>
            <th>Account No.</th><th>Type</th><th>Balance</th><th>Status</th><th>Interest</th><th>Min. balance</th><th id="actionsHeader" class="d-none">Action</th>
          </tr></thead>
          <tbody id="accountsTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Open account modal -->
<div class="modal fade" id="openAccountModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius: var(--radius);">
      <div class="modal-header">
        <h5 class="modal-title">Open a new account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <form id="openAccountForm">
          <label class="form-label">Account type</label>
          <select class="form-select mb-3" id="accountType">
            <option value="SAVINGS">Savings — 4% interest, ₹1,000 min balance</option>
            <option value="CURRENT">Current — for businesses, no min balance</option>
            <option value="STUDENT">Student — 5% interest, low fees</option>
          </select>
          <button type="submit" class="btn btn-gold w-100">Request account</button>
          <p class="text-muted small mt-2 mb-0">An employee will review and activate it shortly.</p>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
const role = Auth.role();
Layout.init(role, "accounts.html");

function statusBadgeClass(status) {
  return { ACTIVE: "badge-status-active", PENDING: "badge-status-pending",
           FROZEN: "badge-status-frozen", CLOSED: "badge-status-closed" }[status] || "badge-status-closed";
}

if (role !== "CUSTOMER") {
  document.getElementById("openAccountBtn").classList.add("d-none");
  document.getElementById("pageTitle").textContent = "All Accounts";
  document.getElementById("pageSubtitle").textContent = "Every account across the bank.";
  if (role === "MANAGER") document.getElementById("actionsHeader").classList.remove("d-none");
}

async function loadAccounts() {
  try {
    const path = role === "CUSTOMER" ? "/customer/accounts" : "/manager/accounts";
    const accounts = await Api.get(path);
    const body = document.getElementById("accountsTableBody");
    if (accounts.length === 0) {
      body.innerHTML = `<tr><td colspan="6" class="text-center text-muted-custom py-4">No accounts found.</td></tr>`;
      return;
    }
    body.innerHTML = accounts.map(a => `
      <tr>
        <td class="font-mono">${a.account_number}</td>
        <td>${a.account_type}</td>
        <td class="font-mono">${formatCurrency(a.balance)}</td>
        <td><span class="badge-status ${statusBadgeClass(a.status)} px-2 py-1 rounded-pill">${a.status}</span></td>
        <td>${a.interest_rate !== undefined ? a.interest_rate + "%" : "-"}</td>
        <td>${a.min_balance !== undefined ? formatCurrency(a.min_balance) : "-"}</td>
        ${role === "MANAGER" ? `<td>${renderManagerActions(a)}</td>` : ""}
      </tr>
    `).join("");
  } catch (err) {
    showAlert("alertBox", err.message);
  }
}

function renderManagerActions(a) {
  if (a.status === "ACTIVE") {
    return `<button class="btn btn-sm btn-outline-gold" onclick="freezeAccount(${a.account_id})">Freeze</button>`;
  }
  if (a.status === "FROZEN") {
    return `<button class="btn btn-sm btn-gold" onclick="activateAccount(${a.account_id})">Activate</button>`;
  }
  return "-";
}

window.freezeAccount = async (accountId) => {
  try {
    await Api.post("/manager/accounts/freeze", { account_id: accountId });
    showAlert("alertBox", "Account frozen.", "success");
    loadAccounts();
  } catch (err) {
    showAlert("alertBox", err.message);
  }
};

window.activateAccount = async (accountId) => {
  try {
    await Api.post("/manager/accounts/activate", { account_id: accountId });
    showAlert("alertBox", "Account activated.", "success");
    loadAccounts();
  } catch (err) {
    showAlert("alertBox", err.message);
  }
};
loadAccounts();

const openForm = document.getElementById("openAccountForm");
if (openForm) {
  openForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      const res = await Api.post("/customer/accounts/open", { account_type: document.getElementById("accountType").value });
      showAlert("modalAlert", `${res.message} Account number: ${res.account_number}`, "success");
      await loadAccounts();
      setTimeout(() => bootstrap.Modal.getInstance(document.getElementById("openAccountModal"))?.hide(), 1500);
    } catch (err) {
      showAlert("modalAlert", err.message);
    }
  });
}
</script>
</body>
</html>
