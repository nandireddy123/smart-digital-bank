<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1">Contact support</h2>
    <p class="text-muted-custom mb-4">Have a question or an issue? Send us a message.</p>

    <div class="row">
      <div class="col-lg-6">
        <div class="content-card">
          <div id="alertBox"></div>
          <form id="supportForm">
            <div class="mb-3">
              <label class="form-label">Subject</label>
              <input type="text" class="form-control" id="subject" required placeholder="e.g. Card not working">
            </div>
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="5" required placeholder="Describe your issue..."></textarea>
            </div>
            <button type="submit" class="btn btn-gold w-100 py-2" id="submitBtn">Submit ticket</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
Layout.init(Auth.role(), "support.html");

document.getElementById("supportForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Submitting...";
  try {
    const res = await Api.post("/profile/support", {
      subject: document.getElementById("subject").value.trim(),
      message: document.getElementById("message").value.trim(),
    });
    showAlert("alertBox", `Ticket #${res.ticket_id} submitted. Our team will get back to you.`, "success");
    document.getElementById("supportForm").reset();
  } catch (err) {
    showAlert("alertBox", err.message);
  } finally {
    btn.disabled = false; btn.textContent = "Submit ticket";
  }
});
</script>
</body>
</html>
