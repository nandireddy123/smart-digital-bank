<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions — Smart Digital Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar d-flex flex-column" id="sbSidebar"></aside>

  <main class="main-content w-100">
    <div class="topbar" id="sbTopbar"></div>
    <h2 class="mb-1" id="pageTitle">Transactions</h2>
    <p class="text-muted-custom mb-4" id="pageSubtitle">Every deposit, withdrawal, and transfer on your accounts.</p>

    <div class="content-card mb-3" id="customerControls">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Account</label>
          <select class="form-select" id="accountId"></select>
        </div>
        <div class="col-md-5">
          <label class="form-label">Search (description or reference no.)</label>
          <input type="text" class="form-control" id="searchKeyword" placeholder="e.g. deposit, TRF...">
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button class="btn btn-navy w-100" id="searchBtn">Search</button>
          <button class="btn btn-outline-gold w-100" id="clearBtn">Clear</button>
        </div>
      </div>
    </div>

    <div id="alertBox"></div>

    <div class="content-card">
      <div class="table-responsive">
        <table class="table table-bank align-middle">
          <thead><tr>
            <th>Date</th><th>Reference</th><th>Type</th><th>Amount</th><th>Balance after</th><th>Description</th><th>Status</th>
          </tr></thead>
          <tbody id="txnTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
const role = Auth.role();
Layout.init(role, "transactions.html");

function typeColor(t) {
  return { DEPOSIT: "text-success", TRANSFER_IN: "text-success",
           WITHDRAW: "text-danger", TRANSFER_OUT: "text-danger" }[t] || "";
}

function renderRows(txns, staffMode) {
  const body = document.getElementById("txnTableBody");
  if (txns.length === 0) {
    body.innerHTML = `<tr><td colspan="7" class="text-center text-muted-custom py-4">No transactions found.</td></tr>`;
    return;
  }
  body.innerHTML = txns.map(t => `
    <tr>
      <td>${formatDate(t.created_at)}</td>
      <td class="font-mono">${t.reference_no}</td>
      <td><span class="${typeColor(t.transaction_type)}">${t.transaction_type.replace("_", " ")}</span></td>
      <td class="font-mono">${formatCurrency(t.amount)}</td>
      <td class="font-mono">${t.balance_after !== undefined ? formatCurrency(t.balance_after) : "-"}</td>
      <td>${t.description || "-"}</td>
      <td><span class="badge-status ${t.status === 'SUCCESS' ? 'badge-status-active' : 'badge-status-frozen'} px-2 py-1 rounded-pill">${t.status}</span></td>
    </tr>
  `).join("");
}

if (role === "CUSTOMER") {
  let accountsCache = [];

  async function loadAccountsAndHistory() {
    try {
      accountsCache = await Api.get("/customer/accounts");
      const select = document.getElementById("accountId");
      if (accountsCache.length === 0) {
        select.innerHTML = `<option value="">No accounts</option>`;
        renderRows([], false);
        return;
      }
      select.innerHTML = accountsCache.map(a => `<option value="${a.account_id}">${a.account_type} — ${a.account_number}</option>`).join("");
      await loadHistory();
    } catch (err) {
      showAlert("alertBox", err.message);
    }
  }

  async function loadHistory() {
    const accountId = document.getElementById("accountId").value;
    if (!accountId) return;
    const txns = await Api.get(`/customer/transactions/${accountId}`);
    renderRows(txns, false);
  }

  document.getElementById("accountId").addEventListener("change", loadHistory);
  document.getElementById("searchBtn").addEventListener("click", async () => {
    const accountId = document.getElementById("accountId").value;
    const keyword = document.getElementById("searchKeyword").value.trim();
    if (!keyword) { loadHistory(); return; }
    try {
      const txns = await Api.get(`/customer/transactions/${accountId}/search?keyword=${encodeURIComponent(keyword)}`);
      renderRows(txns, false);
    } catch (err) {
      showAlert("alertBox", err.message);
    }
  });
  document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("searchKeyword").value = "";
    loadHistory();
  });

  loadAccountsAndHistory();
} else {
  document.getElementById("customerControls").classList.add("d-none");
  document.getElementById("pageTitle").textContent = "All Transactions";
  document.getElementById("pageSubtitle").textContent = "Bank-wide transaction feed.";

  async function loadAll() {
    try {
      const path = role === "MANAGER" ? "/employee/transactions" : "/employee/transactions";
      const txns = await Api.get(path);
      renderRows(txns.map(t => ({ ...t, balance_after: undefined })), true);
    } catch (err) {
      showAlert("alertBox", err.message);
    }
  }
  loadAll();
}
</script>
</body>
</html>
